<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Typeahead</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    #search-wrapper { position: relative; }
    #search-input {
      width: 100%; padding: 10px 14px; font-size: 1rem;
      border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
    }
    #suggestions {
      position: absolute; top: 100%; left: 0; right: 0;
      background: white; border: 1px solid #ddd; border-top: none;
      border-radius: 0 0 6px 6px; z-index: 10; display: none;
    }
    .suggestion-item {
      padding: 10px 14px; cursor: pointer;
      display: flex; justify-content: space-between;
    }
    .suggestion-item:hover { background: #f5f5f5; }
    .suggestion-count { color: #999; font-size: 0.8rem; }
    #search-btn {
      margin-top: 10px; padding: 10px 20px; background: #000;
      color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem;
    }
    #result-msg { margin-top: 14px; color: green; font-size: 0.9rem; }
    h2 { margin-top: 40px; font-size: 1.1rem; }
    #trending-list { list-style: none; padding: 0; }
    #trending-list li {
      padding: 8px 0; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between;
    }
    .trend-count { color: #aaa; font-size: 0.8rem; }
  </style>
</head>
<body>

<h1>Search Typeahead</h1>

<div id="search-wrapper">
  <input type="text" id="search-input" placeholder="Start typing..." autocomplete="off" />
  <div id="suggestions"></div>
</div>

<button id="search-btn">Search</button>
<div id="result-msg"></div>

<h2>Trending Searches</h2>
<ul id="trending-list"></ul>

<script>
  const input = document.getElementById("search-input");
  const suggestionsBox = document.getElementById("suggestions");
  const resultMsg = document.getElementById("result-msg");
  const sourceInfo = document.getElementById("source-info");
  const searchBtn = document.getElementById("search-btn");
  const trendingList = document.getElementById("trending-list");

  let debounceTimer = null;

  input.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    const q = input.value.trim();
    if (q.length < 3) { suggestionsBox.style.display = "none"; return; }
    debounceTimer = setTimeout(() => fetchSuggestions(q), 200);
  });

  async function fetchSuggestions(q) {
    try {
      const res = await fetch(`/suggest?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      renderSuggestions(data);
    } catch (e) { console.error(e); }
  }

  function renderSuggestions(suggestions) {
    suggestionsBox.innerHTML = "";
    if (!suggestions || suggestions.length === 0) {
      suggestionsBox.style.display = "none"; return;
    }
    suggestions.forEach(item => {
      const div = document.createElement("div");
      div.className = "suggestion-item";
      div.innerHTML = `<span>${item.query}</span>
                       <span class="suggestion-count">${item.count.toLocaleString()}</span>`;
      div.addEventListener("click", () => {
        input.value = item.query;
        suggestionsBox.style.display = "none";
        submitSearch(item.query);
      });
      suggestionsBox.appendChild(div);
    });
    suggestionsBox.style.display = "block";
  }

  document.addEventListener("click", e => {
    if (!e.target.closest("#search-wrapper")) suggestionsBox.style.display = "none";
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") { suggestionsBox.style.display = "none"; submitSearch(input.value.trim()); }
  });

  searchBtn.addEventListener("click", () => submitSearch(input.value.trim()));

  async function submitSearch(query) {
    if (!query) return;
    try {
      const res = await fetch("/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query })
      });
      const data = await res.json();
      resultMsg.textContent = `Response: "${data.message}"`;
      suggestionsBox.style.display = "none";
      loadTrending();
    } catch (e) { resultMsg.textContent = "Search failed."; }
  }

  async function loadTrending() {
    try {
      const res = await fetch("/trending");
      const data = await res.json();
      trendingList.innerHTML = "";
      data.forEach(item => {
        const li = document.createElement("li");
        li.innerHTML = `<span>${item.query}</span>
                        <span class="trend-count">${item.count.toLocaleString()} searches</span>`;
        trendingList.appendChild(li);
      });
    } catch (e) { console.error(e); }
  }

  loadTrending();
</script>
</body>
</html>
